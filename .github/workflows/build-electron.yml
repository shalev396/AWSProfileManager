name: Build and Release Electron App

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "electron/**"
      - ".github/workflows/build-electron.yml"
  workflow_dispatch:

jobs:
  prepare:
    name: Compute Version & Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from Git tags
        id: bump
        run: |
          LATEST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          STRIPPED="${LATEST_TAG#v}"
          MAJOR=$(echo "$STRIPPED" | cut -d. -f1)
          MINOR=$(echo "$STRIPPED" | cut -d. -f2)
          PATCH=$(echo "$STRIPPED" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG -> New version: v$VERSION"

      - name: Create draft GitHub Release (also creates the tag)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.tag }} \
            --draft \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes \
            --target main

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    strategy:
      matrix:
        include:
          - name: macOS
            os: macos-latest
            cmd: package:mac
          - name: Windows
            os: windows-latest
            cmd: package:win
          - name: Linux
            os: ubuntu-latest
            cmd: package:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: ./electron
        run: npm ci

      - name: Build Electron app
        working-directory: ./electron
        run: npm run build

      - name: Package & publish to GitHub Release
        working-directory: ./electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --config electron-builder.cjs -c.extraMetadata.version=${{ needs.prepare.outputs.version }} --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
          retention-days: 30

  publish-release:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Undraft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ needs.prepare.outputs.tag }} --draft=false

  cleanup-failed-release:
    name: Clean Up Failed Release
    needs: [prepare, build]
    if: ${{ failure() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Delete draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete ${{ needs.prepare.outputs.tag }} --yes || true

      - name: Delete orphaned tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push origin --delete ${{ needs.prepare.outputs.tag }} 2>/dev/null || true
