name: Build and Release Electron App

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "electron/**"
      - ".github/workflows/build-electron.yml"
  workflow_dispatch:

jobs:
  prepare:
    name: Bump Version & Create Draft Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        working-directory: ./electron
        run: |
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          VERSION="${NEW_VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to $VERSION"

      - name: Commit, tag, and push
        run: |
          git add electron/package.json electron/package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git tag ${{ steps.bump.outputs.tag }}
          git push origin main --follow-tags

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.bump.outputs.tag }} \
            --draft \
            --title "${{ steps.bump.outputs.tag }}" \
            --generate-notes

  build:
    name: Build (${{ matrix.name }})
    needs: prepare
    strategy:
      matrix:
        include:
          - name: macOS
            os: macos-latest
            cmd: package:mac
          - name: Windows
            os: windows-latest
            cmd: package:win
          - name: Linux
            os: ubuntu-latest
            cmd: package:linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: ./electron
        run: npm ci

      - name: Build Electron app
        working-directory: ./electron
        run: npm run build

      - name: Package & publish to GitHub Release
        working-directory: ./electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --config electron-builder.cjs --publish always

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-build
          path: |
            electron/dist/*.dmg
            electron/dist/*.zip
            electron/dist/*.exe
            electron/dist/*.AppImage
          retention-days: 30

  publish-release:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Undraft the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ needs.prepare.outputs.tag }} --draft=false
